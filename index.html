    vignette.addColorStop(0, 'rgba(0,0,0,0.3)');
    vignette.addColorStop(0.15, 'rgba(0,0,0,0)');
    vignette.addColorStop(0.85, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.25)');
    k.fillStyle = vignette;
    k.fillRect(0, 0, W, H);
    const sideVig = k.createLinearGradient(0, 0, W, 0);
    sideVig.addColorStop(0, 'rgba(0,0,0,0.15)');
    sideVig.addColorStop(0.1, 'rgba(0,0,0,0)');
    sideVig.addColorStop(0.9, 'rgba(0,0,0,0)');
    sideVig.addColorStop(1, 'rgba(0,0,0,0.15)');
    k.fillStyle = sideVig;
    k.fillRect(0, 0, W, H);
}

function buildCuttingBoard(bx) {
    const bLeft = 32, bTop = 150, bW = GW - 64, bH = GH - 220;
    const r = 14; // corner radius

    // Board shadow
    bx.fillStyle = 'rgba(0,0,0,0.35)';
    drawRoundedRectOn(bx, bLeft + 4, bTop + 4, bW, bH, r);

    // Board edge / rim — slightly darker maple
    bx.fillStyle = '#C4A06A';
    drawRoundedRectOn(bx, bLeft, bTop, bW, bH, r);

    // Board surface — light maple
    const inset = 4;
    bx.fillStyle = '#D8B880';
    drawRoundedRectOn(bx, bLeft + inset, bTop + inset, bW - inset * 2, bH - inset * 2, r - 2);

    // Horizontal wood grain — alternating maple strip tones
    const stripColors = ['#DCBC86', '#D4B47C', '#D8B880', '#D0AC74', '#DCBC86', '#D6B67E'];
    const stripH = 10;
    bx.save();
    // Clip to board surface
    bx.beginPath();
    drawRoundedRectPath(bx, bLeft + inset, bTop + inset, bW - inset * 2, bH - inset * 2, r - 2);
    bx.clip();

    for (let y = bTop + inset; y < bTop + bH - inset; y += stripH) {
        const idx = Math.floor((y - bTop) / stripH) % stripColors.length;
        bx.fillStyle = stripColors[idx];
        bx.fillRect(bLeft + inset, y, bW - inset * 2, stripH);
    }

    // Subtle grain lines within strips
    bx.strokeStyle = 'rgba(160,120,60,0.12)';
    bx.lineWidth = 1;
    for (let y = bTop + inset + 3; y < bTop + bH - inset; y += 5) {
        bx.beginPath();
        for (let x = bLeft + inset; x < bLeft + bW - inset; x += 6) {
            const wave = ((x * 3 + y * 7) % 5 - 2) * 0.4;
            if (x === bLeft + inset) bx.moveTo(x, y + wave);
            else bx.lineTo(x, y + wave);
        }
        bx.stroke();
    }

    // Juice groove — recessed channel
    const gInset = 18;
    const gLeft = bLeft + gInset, gTop = bTop + gInset;
    const gW = bW - gInset * 2, gH = bH - gInset * 2;
    const gR = 8;
    // Groove shadow (outer edge)
    bx.strokeStyle = 'rgba(140,100,50,0.25)';
    bx.lineWidth = 3;
    bx.beginPath();
    drawRoundedRectPath(bx, gLeft, gTop, gW, gH, gR);
    bx.stroke();
    // Groove highlight (inner edge)
    bx.strokeStyle = 'rgba(230,200,150,0.2)';
    bx.lineWidth = 1;
    bx.beginPath();
    drawRoundedRectPath(bx, gLeft + 2, gTop + 2, gW - 4, gH - 4, gR - 1);
    bx.stroke();

    // Etched Counter Service logo — very faint
    bx.globalAlpha = 0.18;
    bx.fillStyle = '#6B4A2A';
    bx.font = '8px "Press Start 2P", cursive';
    bx.textAlign = 'center';
    bx.textBaseline = 'middle';
    const logoY = bTop + bH - 40;
    bx.fillText('cOUNTEr', bLeft + bW / 2, logoY);
    bx.fillText('SERVICE', bLeft + bW / 2, logoY + 12);
    bx.globalAlpha = 1;

    bx.restore();

    // Top edge highlight
    bx.fillStyle = 'rgba(240,220,180,0.15)';
    bx.fillRect(bLeft + 8, bTop + 1, bW - 16, 2);
}

function drawRoundedRectOn(context, x, y, w, h, r) {
    context.beginPath();
    context.moveTo(x + r, y);
    context.lineTo(x + w - r, y);
    context.arcTo(x + w, y, x + w, y + r, r);
    context.lineTo(x + w, y + h - r);
    context.arcTo(x + w, y + h, x + w - r, y + h, r);
    context.lineTo(x + r, y + h);
    context.arcTo(x, y + h, x, y + h - r, r);
    context.lineTo(x, y + r);
    context.arcTo(x, y, x + r, y, r);
    context.closePath();
    context.fill();
}

function drawRoundedRectPath(context, x, y, w, h, r) {
    context.moveTo(x + r, y);
    context.lineTo(x + w - r, y);
    context.arcTo(x + w, y, x + w, y + r, r);
    context.lineTo(x + w, y + h - r);
    context.arcTo(x + w, y + h, x + w - r, y + h, r);
    context.lineTo(x + r, y + h);
    context.arcTo(x, y + h, x, y + h - r, r);
    context.lineTo(x, y + r);
    context.arcTo(x, y, x + r, y, r);
    context.closePath();
}

function renderGame() {
    renderBoard();

    const config = lunchRushMode ? lunchRushCachedConfig : ROUND_CONFIG[currentRound];
    const sandIdx = config.sandwichIdx;
    const data = SANDWICHES[sandIdx];

    // HUD — round indicator + sandwich name above board
    if (lunchRushMode) {
        drawText('LUNCH RUSH', GW / 2, 22, 8, COLORS.csYellow);
        drawText('CUT ' + (currentRound + 1), GW / 2, 40, 10, COLORS.offWhite);
    } else {
        drawText('ROUND ' + (currentRound + 1) + '/5', GW / 2, 30, 10, COLORS.csYellow);
    }

    // Persistent sandwich name above board
    ctx.save();
    ctx.globalAlpha = 0.6;
    drawText(data.name.toUpperCase(), GW / 2, 55, 8, COLORS.offWhite);
    ctx.restore();

    // Timer bar — below sandwich name
    if (timerActive && timerRemaining > 0) {
        const pct = timerRemaining / timerTotal;
        const barW = GW - 100;
        const barX = 50;
        const barY = 70;

        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barW, 8);

        let timerColor;
        if (pct > 0.5) timerColor = COLORS.offWhite;
        else if (pct > 0.25) timerColor = COLORS.csYellow;
        else timerColor = COLORS.baronRed;

        ctx.fillStyle = timerColor;
        ctx.fillRect(barX, barY, barW * pct, 8);

        drawText(timerRemaining.toFixed(1) + 's', GW / 2, barY + 22, 8, timerColor);
    }

    // Survival reminder for Lunch Rush
    if (lunchRushMode) {
        ctx.save();
        ctx.globalAlpha = 1;
        drawText(LUNCH_RUSH_THRESHOLD + '% TO MAKE THE CUT', GW / 2, GH - 30, 7, COLORS.baronRed);
        ctx.restore();
    }

    // Round progress — mini sandwich icons
    if (!lunchRushMode) {
        const iconW = 18, iconH = 7, gap = 8;
        const totalW = 5 * iconW + 4 * gap;
        const startX = (GW - totalW) / 2;
        const iconY = GH - 38;
        for (let i = 0; i < 5; i++) {
            const ix = startX + i * (iconW + gap);
            ctx.save();
            if (i < currentRound) {
                // Completed — solid CS yellow
                ctx.globalAlpha = 0.9;
                ctx.fillStyle = COLORS.csYellow;
            } else if (i === currentRound) {
                // Current — pulsing
                ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.1) * 0.3;
                ctx.fillStyle = COLORS.csYellow;
            } else {
                // Future — dim
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = '#AAA';
            }
            // Baguette shape: rounded elongated pill with tapered ends
            ctx.beginPath();
            ctx.ellipse(ix + iconW / 2, iconY, iconW / 2, iconH / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            // Score marks — two tiny diagonal lines
            ctx.strokeStyle = ctx.fillStyle;
            ctx.globalAlpha *= 0.5;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(ix + 5, iconY - 2); ctx.lineTo(ix + 7, iconY + 2);
            ctx.moveTo(ix + 10, iconY - 2); ctx.lineTo(ix + 12, iconY + 2);
            ctx.stroke();
            ctx.restore();
        }
    }

    // Streak text
    if (streak >= 3) {
        ctx.save();
        ctx.globalAlpha = 0.8;
        drawText('ON FIRE!', GW / 2, GH - 55, 10, COLORS.perfectGold);
        ctx.restore();
    }

    // Sandwich
    if (sandwich.visible) {
        drawSandwich(sandwich, sandIdx);
    }

    // "GO!" flash
    if (goTimer > 0) {
        const progress = goTimer / 30;
        const scale = 1 + (1 - progress) * 0.3;
        ctx.save();
        ctx.globalAlpha = progress;
        ctx.translate(GW / 2, 296);
        ctx.scale(scale, scale);
        drawTextOutline('GO!', 0, 0, 28, COLORS.csYellow, '#000');
        ctx.restore();
    }
}

            ctx.save();
            ctx.globalAlpha = flash;
            drawText('TAP TO CONTINUE', GW / 2, GH - 30, 8, '#000');
            ctx.restore();
        }
    }

        const killingScore = lunchRushScores[lunchRushScores.length - 1];
        if (killingScore === 0) {
            drawText("TIME'S UP", GW / 2, 198, 8, COLORS.baronRed);
        } else {
            drawText('Final cut: ' + killingScore.toFixed(1) + '%', GW / 2, 198, 8, '#555');
        }
    }

    // Best today
    drawText('BEST TODAY: ' + lunchRushBestToday, GW / 2, 222, 9, '#000');

    // Near-miss motivator
    let infoY = 242;
    if (lunchRushBestToday > 0 && lunchRushStreak >= lunchRushBestToday - 1 && lunchRushStreak < lunchRushBestToday) {
        drawText('1 AWAY FROM YOUR BEST!', GW / 2, infoY, 7, COLORS.baronRed);
        infoY += 18;
    } else if (lunchRushStreak >= lunchRushBestToday && lunchRushStreak > 0) {
        drawText('NEW PERSONAL BEST!', GW / 2, infoY, 7, COLORS.baronRed);
        infoY += 18;
    }

    // Day streak
    if (lunchRushDayStreak > 1) {
        drawText('DAY ' + lunchRushDayStreak + ' STREAK', GW / 2, infoY, 7, '#555');
    }

    // Tally marks — groups of 5 scratched into kraft paper, capped at 30
    const survived = lunchRushStreak; // cuts survived (excluding the failed one)
    if (survived === 0) {
        // X mark for zero cuts
        const xSize = 10, xY = 278;
        ctx.save();
        ctx.strokeStyle = '#5A4530';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(GW / 2 - xSize, xY);
        ctx.lineTo(GW / 2 + xSize, xY + xSize * 2);
        ctx.moveTo(GW / 2 + xSize, xY);
        ctx.lineTo(GW / 2 - xSize, xY + xSize * 2);
        ctx.stroke();
        ctx.restore();
    } else if (survived > 0) {
        const tallyH = 20;
        const tallyW = 3;
        const tallyGap = 5;
        const groupGap = 14;
        const maxShow = 30;
        const shown = Math.min(survived, maxShow);
        const groups = Math.ceil(shown / 5);
        const totalW = groups * (5 * (tallyW + tallyGap) - tallyGap + groupGap) - groupGap;
        const maxW = GW - 60;
        const tallyStartX = (GW - Math.min(totalW, maxW)) / 2;
        const tallyY = 278;

        ctx.save();
        ctx.strokeStyle = '#5A4530';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.beginPath();

        let tx = tallyStartX;
        for (let i = 0; i < shown; i++) {
            const posInGroup = i % 5;
            if (posInGroup === 4) {
                // Diagonal strike-through across the previous 4
                const strikeStartX = tx - 4 * (tallyW + tallyGap);
                ctx.moveTo(strikeStartX - 2, tallyY + tallyH + 3);
                ctx.lineTo(tx + tallyW + 2, tallyY - 3);
            } else {
                // Vertical tally mark with slight wobble
                const wobble = ((i * 7 + 3) % 5 - 2) * 0.04;
                ctx.moveTo(tx + tallyW / 2, tallyY);
                ctx.lineTo(tx + tallyW / 2 + wobble * tallyH, tallyY + tallyH);
                tx += tallyW + tallyGap;
            }

            // Group gap after every 5
            if (posInGroup === 4 && i < shown - 1) {
                tx += groupGap;
            }
        }
        ctx.stroke();
        ctx.restore();

        // Overflow indicator
        if (survived > maxShow) {
            drawText('+' + (survived - maxShow), tx + 10, tallyY + tallyH / 2, 8, '#5A4530');
        }
    }

    // Challenge button — Baron Red, shares score card image + text
    const btnW = 200, btnH = 32;
    const btnX = GW / 2 - btnW / 2;
    let btnY = 335;
    ctx.fillStyle = '#E1625D';
    drawRoundedRect(btnX, btnY, btnW, btnH, 4);
    drawText('CHALLENGE A FRIEND', GW / 2, btnY + btnH / 2, 9, '#FFF');
    buttons.lunchRushShare = { x: btnX, y: btnY, w: btnW, h: btnH };

    // TAP TO TRY AGAIN
    const flash = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = flash;
    drawText('TAP TO TRY AGAIN', GW / 2, btnY + btnH + 30, 10, '#000');
    ctx.globalAlpha = 1;

    // EXIT (small)
    const exitBtnW = 80, exitBtnH = 24;
    const exitBtnX = GW / 2 - exitBtnW / 2, exitBtnY = btnY + btnH + 65;
    ctx.save();
    ctx.globalAlpha = 0.5;
    drawText('EXIT', GW / 2, exitBtnY + exitBtnH / 2, 7, '#555');
    ctx.restore();
    buttons.lunchRushExit = { x: exitBtnX, y: exitBtnY, w: exitBtnW, h: exitBtnH };
}

// ============================================
// GAME LOOP
// ============================================

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const rawDt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    // Clamp dt to prevent spiral of death on tab switches (max ~4 frames at 60fps)
    const clampedDt = Math.min(rawDt, 1 / 15);
    update(clampedDt);
    render();
    requestAnimationFrame(gameLoop);
}

// ============================================
// PAGE VISIBILITY — PAUSE TIMER
// ============================================

document.addEventListener('visibilitychange', () => {
    // Timer pauses automatically — update() won't run while tab is hidden due to rAF
    if (!document.hidden) {
        lastTime = 0; // Prevent huge dt spike on resume
        if (gameState !== 'title' && !wakeLock) requestWakeLock();
    }
});

// Invalidate cached rect on resize/orientation change
window.addEventListener('resize', () => { cachedRect = null; });
window.addEventListener('orientationchange', () => { cachedRect = null; });

// ============================================
// INITIALIZATION
// ============================================

function init() {
    AudioSystem.init();

    // Player ID
    try {
        playerId = localStorage.getItem('shortcut_player_id');
        if (!playerId) {
            playerId = Math.random().toString(36).substring(2, 7);
            localStorage.setItem('shortcut_player_id', playerId);
        }
    } catch(e) {
        playerId = Math.random().toString(36).substring(2, 7);
    }

    // Referral
    try {
        const params = new URLSearchParams(window.location.search);
        refSource = params.get('ref') || '';
        if (refSource) Analytics.referralArrival(refSource);
    } catch(e) {}

    // Load state
    try {
        shortCallShown = localStorage.getItem('shortcut_short_call') === 'true';
        lunchRushUnlocked = localStorage.getItem('shortcut_daily_unlocked') === 'true';
        // Load day streak
        const streakData = loadLunchRushDayStreak();
        if (streakData) {
            const today = getTodayDateStr();
            if (streakData.lastDate === today || streakData.lastDate === getYesterdayDateStr()) {
                lunchRushDayStreak = streakData.streak || 0;
            }
        }
        // Load today's best streak
        const rushData = loadLunchRushData();
        if (rushData && rushData.date === getTodayDateStr()) {
            lunchRushBestToday = rushData.bestStreak || 0;
        }
    } catch(e) {}

    // Load sprites (non-blocking — game starts immediately, sprites appear when ready)
    if (USE_SPRITES) loadAllSprites();

    requestAnimationFrame(gameLoop);
}

init();
    </script>
