function loadSprite(src) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        if (location.protocol !== 'file:') img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null); // fallback to procedural on error
        img.src = src;
    });
}

async function loadAllSprites() {
    const spriteFiles = {
        greenGoddess: 'sprites/chicken-club-side.png',
        smokeshow: 'sprites/smokeshow-side.png',
        buffaloChicken: 'sprites/buffalo-chicken-side.png',
        baron: 'sprites/baron-side.png',
        chickenCaesar: 'sprites/chicken-caesar-side.png'
    };

    const results = await Promise.all(
        SANDWICHES.map(sw => loadSprite(spriteFiles[sw.id]).then(img => ({ id: sw.id, img })))
    );

    let anyLoaded = false;
    for (const { id, img } of results) {
        spriteMap[id] = { side: img };
        if (img) anyLoaded = true;
    }

    spritesLoaded = anyLoaded;
}

function hasSpriteFor(sandwichIdx) {
    if (!USE_SPRITES || !spritesLoaded) return false;
    const id = SANDWICHES[sandwichIdx].id;
    return spriteMap[id] && spriteMap[id].side;
}

// Draw side-view sprite at arbitrary size. Aspect ratio 2.5:1 (320x128).
function drawSideSprite(targetCtx, sandwichIdx, cx, cy, width) {
    const h = width / 2.5;
    if (hasSpriteFor(sandwichIdx)) {
        const sprite = spriteMap[SANDWICHES[sandwichIdx].id].side;
        targetCtx.imageSmoothingEnabled = true;
        targetCtx.imageSmoothingQuality = 'high';
        targetCtx.drawImage(sprite, cx - width / 2, cy - h / 2, width, h);
        targetCtx.imageSmoothingEnabled = false;
    } else {
        // Fallback: procedural side view (swap ctx for off-canvas rendering)
        const fakeSw = { x: 0, y: 0, w: width, h: h, rotation: 0, visible: true };
        const prevCtx = ctx;
        ctx = targetCtx;
        ctx.save();
        ctx.translate(cx, cy);
        drawSandwichProcedural(fakeSw, sandwichIdx);
        ctx.restore();
        ctx = prevCtx;
    }
}

// Call from console: verifyDeterminism()
// Generates the Lunch Rush sequence twice and confirms they match.
function verifyDeterminism(numCuts) {
    numCuts = numCuts || 20;
    const run1 = [], run2 = [];
    for (let i = 0; i < numCuts; i++) {
        const c1 = getLunchRushConfig(i);
        const c2 = getLunchRushConfig(i);
        run1.push({ cut: i, sandwich: SANDWICHES[c1.sandwichIdx].name, offset: c1.offsetX.toFixed(1), rot: c1.rotation.toFixed(1), timer: c1.timer.toFixed(1) });
        run2.push({ cut: i, sandwich: SANDWICHES[c2.sandwichIdx].name, offset: c2.offsetX.toFixed(1), rot: c2.rotation.toFixed(1), timer: c2.timer.toFixed(1) });
    }
    let pass = true;
    for (let i = 0; i < numCuts; i++) {
        if (JSON.stringify(run1[i]) !== JSON.stringify(run2[i])) { pass = false; break; }
    }
    console.table(run1);
    console.log(pass ? 'PASS: Both runs identical' : 'FAIL: Runs differ');
    return pass;
}

// ============================================

const AudioSystem = {
    ctx: null,
    enabled: true,
    noiseBuffer: null,

    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            // Pre-generate 1 second noise buffer
            const bufSize = this.ctx.sampleRate;
            this.noiseBuffer = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
            const d = this.noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
        } catch(e) { this.enabled = false; }
    },

    resume() {
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume().catch(() => {});
    },

    playTone(freq, dur, type, vol) {
        if (!type) type = 'square';
        if (!vol) vol = 0.3;
        if (!this.enabled || !this.ctx) return;
        this.resume();
        try {
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            // Fade in over 5ms to avoid click
            gain.gain.setValueAtTime(0.001, t);
            gain.gain.linearRampToValueAtTime(vol, t + 0.005);
            gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(t);
            osc.stop(t + dur + 0.01);
            osc.onended = () => { osc.disconnect(); gain.disconnect(); };
        } catch(e) {}
    },

    playNoise(dur, freqLow, freqHigh, vol) {
        if (!vol) vol = 0.2;
        if (!this.enabled || !this.ctx || !this.noiseBuffer) return;
        this.resume();
        try {
            const t = this.ctx.currentTime;
            const src = this.ctx.createBufferSource();
            src.buffer = this.noiseBuffer;
            const bp = this.ctx.createBiquadFilter();
            bp.type = 'bandpass';
            bp.frequency.value = (freqLow + freqHigh) / 2;
            bp.Q.value = 1;
            const g = this.ctx.createGain();
            // Fade in over 5ms to avoid click
            g.gain.setValueAtTime(0.001, t);
            g.gain.linearRampToValueAtTime(vol, t + 0.005);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            src.connect(bp);
            bp.connect(g);
            g.connect(this.ctx.destination);
            src.start(t, 0, dur + 0.01);
            src.onended = () => { src.disconnect(); bp.disconnect(); g.disconnect(); };
        } catch(e) {}
    },

    sliceShhk() {
        this.playNoise(0.1, 2000, 4000, 0.35);
    },

    halvesThud() {
        this.playTone(100, 0.2, 'sine', 0.3);

        this.playNoise(0.2, 200, 600, 0.3);
    },

    streakFire() {
        this.playNoise(0.1, 1000, 3000, 0.15);
        setTimeout(() => this.playTone(880, 0.1, 'square', 0.2), 50);
        setTimeout(() => this.playTone(1100, 0.1, 'square', 0.2), 100);
    },

    resultsDrumRoll(duration) {
        if (!this.ctx) return;
        const ac = this.ctx;
        const t = ac.currentTime;
        // Snare-like noise hits that accelerate over duration
        const hits = 16;
        for (let i = 0; i < hits; i++) {
            const progress = i / hits;
            const delay = duration * (1 - Math.pow(1 - progress, 2)); // ease-in: accelerating hits
            const vol = 0.05 + progress * 0.15;
            setTimeout(() => this.playNoise(0.03, 800, 2000, vol), delay * 1000);
        }
    }
};

// ============================================
// GEOMETRY ENGINE
// ============================================

function rotatePoint(px, py, cx, cy, angle) {
    const cos = Math.cos(angle);
    const sin = Math.sin(angle);
    const dx = px - cx;
    const dy = py - cy;
    return { x: cx + dx * cos - dy * sin, y: cy + dx * sin + dy * cos };
}

function unrotatePoint(px, py, cx, cy, angle) {
    return rotatePoint(px, py, cx, cy, -angle);
}

function lineSegmentIntersection(p1, p2, p3, p4) {
    const d1x = p2.x - p1.x, d1y = p2.y - p1.y;
    const d2x = p4.x - p3.x, d2y = p4.y - p3.y;
    const denom = d1x * d2y - d1y * d2x;
    if (Math.abs(denom) < 1e-10) return null;
    const ua = ((p3.x - p1.x) * d2y - (p3.y - p1.y) * d2x) / denom;
    const ub = ((p3.x - p1.x) * d1y - (p3.y - p1.y) * d1x) / denom;
    if (ua < -1e-6 || ua > 1 + 1e-6 || ub < -1e-6 || ub > 1 + 1e-6) return null;
    return { x: p1.x + ua * d1x, y: p1.y + ua * d1y, ua, ub };
}

function getRectCorners(rect) {
    const hw = rect.w / 2, hh = rect.h / 2;
    const cx = rect.x, cy = rect.y;
    const corners = [
        { x: cx - hw, y: cy - hh },
        { x: cx + hw, y: cy - hh },
        { x: cx + hw, y: cy + hh },
        { x: cx - hw, y: cy + hh }
    ];
    if (rect.rotation) {
        return corners.map(c => rotatePoint(c.x, c.y, cx, cy, rect.rotation * Math.PI / 180));
    }
    return corners;
}

function getRectEdges(corners) {
    return [
        [corners[0], corners[1]],
        [corners[1], corners[2]],
        [corners[2], corners[3]],
        [corners[3], corners[0]]
    ];
}

function lineRectIntersection(lineStart, lineEnd, rect) {
    const corners = getRectCorners(rect);
    const edges = getRectEdges(corners);
    const hits = [];
    for (let i = 0; i < edges.length; i++) {
        const hit = lineSegmentIntersection(lineStart, lineEnd, edges[i][0], edges[i][1]);
        if (hit) {
            hit.edgeIndex = i;
            hits.push(hit);
        }
    }
    // Deduplicate very close hits (corner hits)
    const unique = [];
    for (const h of hits) {
        let isDup = false;
        for (const u of unique) {
            if (Math.abs(h.x - u.x) < 1 && Math.abs(h.y - u.y) < 1) { isDup = true; break; }
        }
        if (!isDup) unique.push(h);
    }
    // Sort by parameter along cut line
    unique.sort((a, b) => a.ua - b.ua);
    if (unique.length >= 2) return [unique[0], unique[unique.length - 1]];
    return null;
}

function polygonArea(verts) {
    let area = 0;
    const n = verts.length;
    for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        area += verts[i].x * verts[j].y;
        area -= verts[j].x * verts[i].y;
    }
    return Math.abs(area) / 2;
}

function splitRectangleByLine(rect, entry, exit) {
    const corners = getRectCorners(rect);

    // Use edgeIndex directly from lineRectIntersection hits
    const entryEdge = entry.edgeIndex;
    const exitEdge = exit.edgeIndex;

    if (entryEdge === undefined || exitEdge === undefined || entryEdge === exitEdge) return null;

    // Build two polygons by walking corners
    const polyA = [{ x: entry.x, y: entry.y }];
    const polyB = [{ x: exit.x, y: exit.y }];

    // Walk from entry edge end to exit edge start (polygon A)
    let i = (entryEdge + 1) % 4;
    while (i !== (exitEdge + 1) % 4) {
        polyA.push({ x: corners[i].x, y: corners[i].y });
        i = (i + 1) % 4;
    }
    polyA.push({ x: exit.x, y: exit.y });

    // Walk from exit edge end to entry edge start (polygon B)
    i = (exitEdge + 1) % 4;
    while (i !== (entryEdge + 1) % 4) {
        polyB.push({ x: corners[i].x, y: corners[i].y });
        i = (i + 1) % 4;
    }
    polyB.push({ x: entry.x, y: entry.y });

    return [polyA, polyB];
}

function calculateCutScore(polyA, polyB, entry, exit, sandwichRotation) {
    const areaA = polygonArea(polyA);
    const areaB = polygonArea(polyB);
    const total = areaA + areaB;
    if (total < 1) return 0;
    const smaller = Math.min(areaA, areaB);
    let rawScore = Math.min((smaller / total) * 2 * 100, 100);

    // Angle penalty: penalize cuts parallel to the sandwich's long axis
    const cutAngle = Math.atan2(exit.y - entry.y, exit.x - entry.x);
    const sandAngle = (sandwichRotation || 0) * Math.PI / 180;
    const angleDiff = cutAngle - sandAngle;
    const perp = Math.abs(Math.sin(angleDiff)); // 1 = perpendicular, 0 = parallel
    const penalty = Math.pow(perp, 0.3); // steeper curve — sloppy angles cost more
    rawScore *= (0.4 + 0.6 * penalty); // worst case 40% of raw score

    return Math.min(rawScore, 100);
}

// ============================================
// DRAWING HELPERS
// ============================================

function drawText(text, x, y, size, color, align = 'center', baseline = 'middle') {
    ctx.font = `${size}px 'Press Start 2P', cursive`;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, x, y);
}

function drawTextOutline(text, x, y, size, fillColor, outlineColor, align = 'center') {
    ctx.font = `${size}px 'Press Start 2P', cursive`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = outlineColor;
    ctx.lineWidth = 3;
    ctx.strokeText(text, x, y);
    ctx.fillStyle = fillColor;
    ctx.fillText(text, x, y);
}

function drawSandwich(sw, sandwichIdx, alpha) {
    if (alpha === undefined) alpha = 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(sw.x, sw.y);
    if (sw.rotation) ctx.rotate(sw.rotation * Math.PI / 180);

    const hw = sw.w / 2, hh = sw.h / 2;

    if (hasSpriteFor(sandwichIdx)) {
        const sprite = spriteMap[SANDWICHES[sandwichIdx].id].side;
        ctx.drawImage(sprite, -hw, -hh, sw.w, sw.h);
    } else {
        drawSandwichProcedural(sw, sandwichIdx);
    }

    ctx.restore();
}

function drawSandwichProcedural(sw, sandwichIdx) {
    const hw = sw.w / 2, hh = sw.h / 2;
    const data = SANDWICHES[sandwichIdx];

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    drawRoundedRect(-hw + 4, -hh + 4, sw.w, sw.h, 12);

    // Bottom crust
    ctx.fillStyle = '#A67C3D';
    drawRoundedRect(-hw, -hh, sw.w, sw.h, 12);

    // Main bread body
    ctx.fillStyle = '#D4A54A';
    drawRoundedRect(-hw + 2, -hh + 2, sw.w - 4, sw.h - 4, 10);

    // Top highlight
    ctx.fillStyle = '#E8C46A';
    drawRoundedRect(-hw + 4, -hh + 4, sw.w - 8, sw.h * 0.4, 8);

    // Score marks on top crust
    ctx.strokeStyle = '#A67C3D';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
        const sx = -hw + 20 + i * (sw.w - 40) / 3;
        ctx.beginPath();
        ctx.moveTo(sx - 8, -hh + 8);
        ctx.lineTo(sx + 8, -hh + 18);
        ctx.stroke();
    }

    // Filling layers visible at ends
    const layers = data.layers;
    const layerH = (sw.h - 24) / layers.length;
    for (let i = 0; i < layers.length; i++) {
        ctx.fillStyle = layers[i];
        // Left end
        ctx.fillRect(-hw + 3, -hh + 12 + i * layerH, 14, layerH + 1);
        // Right end
        ctx.fillRect(hw - 17, -hh + 12 + i * layerH, 14, layerH + 1);
    }

    // Paper wrap at bottom
    ctx.fillStyle = '#F0EAE0';
    ctx.fillRect(-hw + 8, hh - 12, sw.w - 16, 10);
    ctx.fillStyle = '#E0D4C0';
    ctx.fillRect(-hw + 8, hh - 12, sw.w - 16, 2);

    // Dark outline
    ctx.strokeStyle = COLORS.darkOutline;
    ctx.lineWidth = 1.5;
    drawRoundedRect(-hw, -hh, sw.w, sw.h, 12, true);
}

function drawRoundedRect(x, y, w, h, r, strokeOnly) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
    if (strokeOnly) ctx.stroke();
    else ctx.fill();
}


// ============================================
// PARTICLE SYSTEM
// ============================================

function spawnCrumbs(x, y, count, colors) {
    for (let i = 0; i < count && particles.length < 50; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 3,
            vy: -Math.random() * 2,
            size: 1 + Math.random() * 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            life: 40 + Math.random() * 30,
            gravity: 0.12
        });
    }
}

function spawnSparkles(x, y, count) {
    for (let i = 0; i < count && particles.length < 50; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            size: 1 + Math.random(),
            color: COLORS.perfectGold,
            life: 20 + Math.random() * 20,
            gravity: 0,
            sparkle: true
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity || 0;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function renderParticles() {
    for (const p of particles) {
        const alpha = Math.min(1, p.life / 15);
        ctx.globalAlpha = alpha;
        if (p.sparkle && frameCount % 4 < 2) {
            ctx.fillStyle = '#FFF';
        } else {
            ctx.fillStyle = p.color;
        }
        ctx.fillRect(Math.round(p.x), Math.round(p.y), Math.round(p.size), Math.round(p.size));
    }
    ctx.globalAlpha = 1;
}

// ============================================
// CUT ANIMATION
// ============================================

function startCutAnimation(entry, exit, polyA, polyB, score) {
    const sandwichIdx = lunchRushMode ? lunchRushCachedConfig.sandwichIdx : ROUND_CONFIG[currentRound].sandwichIdx;
    const data = SANDWICHES[sandwichIdx];

    // Determine perpendicular direction for separation
    const dx = exit.x - entry.x;
    const dy = exit.y - entry.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const perpX = -dy / len;
    const perpY = dx / len;

    // Determine which poly is on which side
    const midAx = polyA.reduce((s, v) => s + v.x, 0) / polyA.length;
    const midAy = polyA.reduce((s, v) => s + v.y, 0) / polyA.length;
    const side = (midAx - entry.x) * perpX + (midAy - entry.y) * perpY;

    const dirA = side > 0 ? 1 : -1;

    // Compute perfect center cut line (perpendicular to long axis, through center)
    const sandRot = (sandwich.rotation || 0) * Math.PI / 180;
    const perpAngle = sandRot + Math.PI / 2;
    const halfDiag = Math.sqrt(sandwich.w * sandwich.w + sandwich.h * sandwich.h) / 2;
    const perfectEntry = {
        x: sandwich.x + Math.cos(perpAngle) * halfDiag,
        y: sandwich.y + Math.sin(perpAngle) * halfDiag
    };
    const perfectExit = {
        x: sandwich.x - Math.cos(perpAngle) * halfDiag,
        y: sandwich.y - Math.sin(perpAngle) * halfDiag
    };

    cutAnim = {
        frame: 0,
        totalFrames: 36,
        entry: { ...entry },
        exit: { ...exit },
        polyA, polyB,
        perpX, perpY,
        dirA,
        score,
        sandwichIdx,
        sandwichState: { ...sandwich },
        flashAlpha: 1,
        separation: 0,
        done: false,
        perfectEntry,
        perfectExit
    };

    // Spawn crumbs along cut line
    const crumbColors = [COLORS.breadCrust, COLORS.breadInside, data.dominant, '#E8C46A'];
    for (let t = 0; t <= 1; t += 0.15) {
        const cx = entry.x + (exit.x - entry.x) * t;
        const cy = entry.y + (exit.y - entry.y) * t;
        spawnCrumbs(cx, cy, 3, crumbColors);
    }

    AudioSystem.sliceShhk();
    Haptics.cut();
}

function updateCutAnimation() {
    if (!cutAnim) return;
    cutAnim.frame++;
    const f = cutAnim.frame;
    const t = cutAnim.totalFrames;

    if (f <= 12) {
        // Freeze + flash
        cutAnim.flashAlpha = 1 - (f / 12);
    } else {
        // Separation phase
        const sepProgress = (f - 12) / (t - 12);
        const ease = 1 - Math.pow(1 - sepProgress, 3);
        cutAnim.separation = ease * 25;

        if (f === 18) {
            AudioSystem.halvesThud();
        }
    }

    if (f >= t) {
        // Animation done, show score
        const score = cutAnim.score;
        let label, color, subtitle = '';

        if (score >= 98) {
            label = 'PERFECT!';
            color = COLORS.perfectGold;
            AudioSystem.scorePerfect();
            Haptics.perfect();
            spawnSparkles(GW / 2, GH / 2 - 20, 20);
        } else if (score >= 90) {
            label = 'NICE!';
            color = COLORS.offWhite;
            AudioSystem.scoreNice();
            Haptics.vibrate(6);
            spawnSparkles(GW / 2, GH / 2 - 20, 8);
        } else if (score >= 80) {
            label = 'OK';
            color = '#888';
            AudioSystem.scoreOk();
            subtitle = 'So close to NICE...';
        } else {
            label = 'OOOF';
            color = COLORS.baronRed;
            AudioSystem.scoreOof();
            subtitle = 'Try a steadier swipe';
        }

        // Streak
        if (score >= 90) {
            streak++;
            if (streak === 3) {
                streakFlashTimer = 60;
                AudioSystem.streakFire();
            }
            if (streak >= 2) streakFlashTimer = Math.max(streakFlashTimer, 30);
        } else {
            streak = 0;
        }

        scoreDisplay = { score, label, subtitle, color, timer: 90 };
        const completeSandwichIdx = lunchRushMode ? lunchRushCachedConfig.sandwichIdx : ROUND_CONFIG[currentRound].sandwichIdx;
        Analytics.roundComplete(currentRound + 1, SANDWICHES[completeSandwichIdx].name, score, label);
        if (lunchRushMode) {
            Analytics.lunchRushCut(currentRound + 1, SANDWICHES[completeSandwichIdx].name, score);
        }

        roundScores.push(score);

        gameState = 'animating_score';
    }
}

function renderCutAnimation() {
    if (!cutAnim) return;
    const ca = cutAnim;
    const sw = ca.sandwichState;
    const sandIdx = ca.sandwichIdx;

    // Draw each half with clipping — clean slide apart, no rotation
    for (let half = 0; half < 2; half++) {
        const poly = half === 0 ? ca.polyA : ca.polyB;
        const dir = half === 0 ? ca.dirA : -ca.dirA;
        const offsetX = ca.perpX * ca.separation * dir;
        const offsetY = ca.perpY * ca.separation * dir;

        ctx.save();
        ctx.translate(offsetX, offsetY);

        // Clip to this half
        ctx.beginPath();
        ctx.moveTo(poly[0].x, poly[0].y);
        for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
        ctx.closePath();
        ctx.clip();

        // Draw the sandwich
        drawSandwich(sw, sandIdx);

        ctx.restore();
    }

    // Cut line flash
    if (ca.flashAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = ca.flashAlpha;
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#FFF';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(ca.entry.x, ca.exit.y > ca.entry.y ? ca.entry.y - 20 : ca.entry.y + 20);
        ctx.lineTo(ca.entry.x, ca.entry.y);
        ctx.lineTo(ca.exit.x, ca.exit.y);
        ctx.stroke();
        ctx.restore();
    }
}

// ============================================
// INPUT SYSTEM
// ============================================

function getCanvasCoords(clientX, clientY) {
    const now = performance.now();
    if (!cachedRect || now - cachedRectTime > 250) {
        cachedRect = canvas.getBoundingClientRect();
        cachedRectTime = now;
    }
    return {
        x: (clientX - cachedRect.left) / cachedRect.width * GW,
        y: (clientY - cachedRect.top) / cachedRect.height * GH
    };
}

function handlePointerDown(cx, cy) {
    AudioSystem.resume();

    if (gameState === 'title') {
        // Check Lunch Rush button
        if (lunchRushUnlocked && buttons.daily) {
            const b = buttons.daily;
            if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
                startLunchRush();
                AudioSystem.uiSelect();
                return;
            }
        }
        // Check PLAY button (or tap anywhere else)
        startMainGame();
        return;
    }

    if (gameState === 'intro') {
        // Tap to skip intro → go to ready with GO! flash
        if (introTimer > 20) {
            gameState = 'ready';
            goTimer = 30;
            AudioSystem.uiSelect();
        }
        return;
    }

    if (gameState === 'ready' || gameState === 'cutting') {
        swipe.active = true;
        swipe.startX = cx;
        swipe.startY = cy;
        swipe.currentX = cx;
        swipe.currentY = cy;
        cutParticles = [];
        Haptics.swipeStart();
        gameState = 'cutting';
        return;
    }

    if (gameState === 'short_call') {
        currentRound++;
        gameState = 'intro';
        introTimer = 0;
        AudioSystem.uiSelect();
        return;
    }

    if (gameState === 'animating_score') return;

    if (gameState === 'results') {
        // Tap to advance faster
        if (resultsPhase >= 2) advanceFromResults();
        return;
    }

    if (gameState === 'menu_show') {
        // Check order button tap
        if (buttons.orderNow) {
            const b = buttons.orderNow;
            if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
                Analytics.orderLinkClick(getCouponInfo(getAvgScore()).code);
                window.open('https://counterservice.com/', '_blank');
                return;
            }
        }
        const elapsed = frameCount - menuShowTimer;
        if (elapsed < 30) Analytics.menuShowcaseSkip();
        advanceFromMenuShow();
        return;
    }

    if (gameState === 'reward') {
        handleRewardTap(cx, cy);
        return;
    }

    if (gameState === 'timeout') return;

    if (gameState === 'lunch_rush_death') {
        // Check share button
        if (buttons.lunchRushShare) {
            const b = buttons.lunchRushShare;
            if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
                shareLunchRush();
                return;
            }
        }
        // Check exit button
        if (buttons.lunchRushExit) {
            const b = buttons.lunchRushExit;
            if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
                gameState = 'title';
                releaseWakeLock();
                return;
            }
        }
        // Instant restart
        startLunchRush();
        return;
    }
}

function handlePointerMove(cx, cy) {
    if (!swipe.active) return;
    swipe.currentX = cx;
    swipe.currentY = cy;

    // Spawn trail particles
    if (cutParticles.length < 15) {
        cutParticles.push({
            x: cx, y: cy,
            life: 10 + Math.random() * 5,
            size: 1 + Math.random()
        });
    }
}

function handlePointerUp(cx, cy) {
    if (!swipe.active) return;
    swipe.active = false;
    swipe.currentX = cx;
    swipe.currentY = cy;

    if (gameState !== 'cutting') return;

    // Check intersection with sandwich
    const lineStart = { x: swipe.startX, y: swipe.startY };
    const lineEnd = { x: swipe.currentX, y: swipe.currentY };

    // Min swipe length
    const swipeLen = Math.sqrt((lineEnd.x - lineStart.x) ** 2 + (lineEnd.y - lineStart.y) ** 2);
    if (swipeLen < 20) {
        gameState = 'ready';
        return;
    }

    const hits = lineRectIntersection(lineStart, lineEnd, sandwich);

    if (!hits) {
        // Miss — timer keeps running (no reset)
        showToast('MISS!');
        gameState = 'ready';
        return;
    }

    const entry = hits[0];
    const exit = hits[1];

    const polys = splitRectangleByLine(sandwich, entry, exit);
    if (!polys) {
        showToast('MISS!');
        gameState = 'ready';
        return;
    }

    const score = calculateCutScore(polys[0], polys[1], entry, exit, sandwich.rotation);
    timerActive = false;

    startCutAnimation(entry, exit, polys[0], polys[1], score);
    gameState = 'animating';
}

// Touch listeners
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const coords = getCanvasCoords(touch.clientX, touch.clientY);
    handlePointerDown(coords.x, coords.y);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const coords = getCanvasCoords(touch.clientX, touch.clientY);
    handlePointerMove(coords.x, coords.y);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    const coords = getCanvasCoords(
        e.changedTouches[0].clientX,
        e.changedTouches[0].clientY
    );
    handlePointerUp(coords.x, coords.y);
}, { passive: false });

// Mouse listeners
let mouseDown = false;
canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    const coords = getCanvasCoords(e.clientX, e.clientY);
    handlePointerDown(coords.x, coords.y);
});
canvas.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    const coords = getCanvasCoords(e.clientX, e.clientY);
    handlePointerMove(coords.x, coords.y);
});
canvas.addEventListener('mouseup', (e) => {
    mouseDown = false;
    const coords = getCanvasCoords(e.clientX, e.clientY);
    handlePointerUp(coords.x, coords.y);
});

// ============================================
// GAME FLOW
// ============================================

function startMainGame() {
    gameState = 'intro';
    currentRound = 0;
    roundScores = [];
    streak = 0;
    lunchRushMode = false;
    playCount++;
    introTimer = 0;
    requestWakeLock();
    Analytics.gameStart('main');
}

function startLunchRush() {
    lunchRushMode = true;
    lunchRushStreak = 0;
    lunchRushScores = [];
    gameState = 'intro';
    currentRound = 0;
    roundScores = [];
    streak = 0;
    introTimer = 0;
    requestWakeLock();

    // Update day streak
    const today = getTodayDateStr();
    let streakData = loadLunchRushDayStreak();
    if (!streakData) streakData = { lastDate: '', streak: 0 };
    if (streakData.lastDate !== today) {
        if (streakData.lastDate === getYesterdayDateStr()) {
            streakData.streak++;
        } else {
            streakData.streak = 1;
        }
        streakData.lastDate = today;
        saveLunchRushDayStreak(streakData);
    }
    lunchRushDayStreak = streakData.streak;

    // Increment attempts
    let data = loadLunchRushData();
    const dateStr = getTodayDateStr();
    if (!data || data.date !== dateStr) {
        data = { date: dateStr, attempts: 0, bestStreak: 0 };
    }
    data.attempts++;
    lunchRushAttempts = data.attempts;
    saveLunchRushData(data);

    Analytics.lunchRushStart(lunchRushAttempts);
    Analytics.gameStart('lunch_rush');
}

function setupRound() {
    if (lunchRushMode) lunchRushCachedConfig = getLunchRushConfig(currentRound);
    const config = lunchRushMode ? lunchRushCachedConfig : ROUND_CONFIG[currentRound];

    sandwich.w = 200;
    sandwich.h = 80;
    sandwich.y = 296;
    sandwich.visible = true;

    // Position
    if (config.offsetRange) {
        const range = config.offsetRange;
        sandwich.x = GW / 2 + range[0] + Math.random() * (range[1] - range[0]);
    } else {
        sandwich.x = GW / 2 + (config.offsetX || 0);
    }

    // Rotation
    if (config.rotationRange) {
        const dir = Math.random() < 0.5 ? -1 : 1;
        sandwich.rotation = dir * (config.rotationRange[0] + Math.random() * (config.rotationRange[1] - config.rotationRange[0]));
    } else {
        sandwich.rotation = config.rotation || 0;
    }

    // Timer — deferred until GO! flash ends (see ready case in update)
    if (config.timer > 0) {
        timerTotal = config.timer;
        timerRemaining = config.timer;
        timerActive = false;
    } else {
        timerActive = false;
        timerRemaining = 0;
        timerTotal = 0;
    }

    // Drift
    if (config.drift) {
        driftVX = (config.driftSpeed != null ? config.driftSpeed : 0.7) * (Math.random() < 0.5 ? 1 : -1);
        driftVR = (config.rotSpeed != null ? config.rotSpeed : 0.4) * (Math.random() < 0.5 ? 1 : -1);
    } else {
        driftVX = 0;
        driftVR = 0;
    }

    sandwichEntranceProgress = 0;
    cutAnim = null;
    scoreDisplay.timer = 0;
}

function nextRoundOrEnd() {
    if (lunchRushMode) {
        const lastScore = roundScores[roundScores.length - 1];
        return lastScore < LUNCH_RUSH_THRESHOLD ? 'lunch_rush_death' : 'intro';
    }
    if (currentRound >= 4) {
        return 'results';
    }
    return 'intro';
}

function advanceToNextRound() {
    const next = nextRoundOrEnd();
    if (next === 'intro') {
        currentRound++;
        gameState = 'intro';
        introTimer = 0;
    } else if (next === 'results') {
        gameState = 'results';
        resultsAnimProgress = 0;
        resultsPhase = 0;
        resultsTimer = 0;
        // Drum roll builds through bar animations into rank reveal (~2.5s)
        AudioSystem.resultsDrumRoll(2.5);
        worstRound = 0;
        for (let i = 1; i < roundScores.length; i++) {
            if (roundScores[i] < roundScores[worstRound]) worstRound = i;
        }
        const avg = getAvgScore();
        const rank = getRankTitle(avg);
        const { code } = getCouponInfo(avg);
        Analytics.gameComplete(avg, rank, code, lunchRushMode ? 'lunch_rush' : 'main');
    } else if (next === 'lunch_rush_death') {
        gameState = 'lunch_rush_death';
        lunchRushStreak = roundScores.length - 1; // cuts survived (last one killed you)
        lunchRushScores = roundScores.slice();
        lunchRushKillingSandwich = lunchRushCachedConfig.sandwichIdx;

        // Persist streak data
        const dateStr = getTodayDateStr();
        let data = loadLunchRushData();
        if (!data || data.date !== dateStr) {
            data = { date: dateStr, attempts: lunchRushAttempts, bestStreak: 0 };
        }
        if (lunchRushStreak > data.bestStreak) data.bestStreak = lunchRushStreak;
        lunchRushBestToday = data.bestStreak;
        saveLunchRushData(data);

        Analytics.lunchRushEnd(lunchRushStreak, lunchRushBestToday);
        // Pre-generate share card so it's instant on tap
        cachedShareCardBlob = null;
        generateLunchRushShareCard().then(b => { cachedShareCardBlob = b; }).catch(() => {});
    }
}

function advanceFromResults() {
    gameState = 'menu_show';
    menuShowTimer = frameCount;
    // Random sandwich, no repeats until all 5 seen
    if (showcaseSeenList.length >= SANDWICHES.length) showcaseSeenList = [];
    const available = [];
    for (let i = 0; i < SANDWICHES.length; i++) {
        if (showcaseSeenList.indexOf(i) === -1) available.push(i);
    }
    showcaseSandwichIdx = available[Math.floor(Math.random() * available.length)];
    showcaseSeenList.push(showcaseSandwichIdx);
    Analytics.menuShowcaseView(SANDWICHES[showcaseSandwichIdx].fullName);
}

function advanceFromMenuShow() {
    gameState = 'reward';
    setupRewardScreen();
    // Pre-generate share card so it's instant on tap
    cachedShareCardBlob = null;
    generateShareCard().then(b => { cachedShareCardBlob = b; }).catch(() => {});
}

function setupRewardScreen() {
    const avg = getAvgScore();
    const { rank, code, desc } = getCouponInfo(avg);
    Analytics.couponReveal(code, rank);

    // Mark Lunch Rush as unlocked
    if (!lunchRushUnlocked) {
        lunchRushUnlocked = true;
        try { localStorage.setItem('shortcut_daily_unlocked', 'true'); } catch(e) {}
    }
}

function getCouponInfo(avg) {
    if (avg >= 97) return { rank: 'Sous Chef', code: 'SHORTCUT', desc: '$5 off $20 for you AND a friend' };
    if (avg >= 90) return { rank: 'Line Cook', code: 'CLEANCUT', desc: 'Free cookie with any purchase' };
    return { rank: 'Prep Cook', code: 'FIRSTCUT', desc: 'Free drink with any purchase' };
}

function getRankTitle(avg) {
    if (avg >= 95) return 'SOUS CHEF';
    if (avg >= 90) return 'LINE COOK';
    return 'PREP COOK';
}

// ============================================
// LUNCH RUSH
// ============================================

function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

function dateSeed(dateStr) {
    let hash = 0;
    for (let i = 0; i < dateStr.length; i++) {
        hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
        hash |= 0;
    }
    return hash;
}

function getTodayDateStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function getYesterdayDateStr() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function getLunchRushConfig(cutNumber) {
    const dateStr = getTodayDateStr();
    const seed = dateSeed(dateStr);
    // Sandwich sequence: dedicated RNG stream, no back-to-back repeats
    const sandRng = mulberry32(seed + 1);
    let prevSandwich = -1, sandwichIdx = 0;
    for (let c = 0; c <= cutNumber; c++) {
        sandwichIdx = Math.floor(sandRng() * SANDWICHES.length);
        if (sandwichIdx === prevSandwich) sandwichIdx = (sandwichIdx + 1) % SANDWICHES.length;
        prevSandwich = sandwichIdx;
    }

    // Difficulty params: separate RNG stream
    const rng = mulberry32(seed);
    for (let i = 0; i < cutNumber * 3; i++) rng();

    // Sawtooth difficulty pattern (cycles of 4)
    const posInCycle = cutNumber % 4;
    const cycle = Math.floor(cutNumber / 4);

    // Per-cycle escalation (aggressive ramp)
    const baseTimerShrink = 0.4 * cycle;
    const baseOffsetGrow = 18 * cycle;
    const baseRotGrow = 7 * cycle;

    let offsetX = 0, rotation = 0, timer = 3.5, drift = true, driftSpeed = 0.2, rotSpeed = 0;

    if (posInCycle === 0) {
        // Easy / Breather — slight offset, not a freebie
        const maxOff = Math.min(95, 15 + baseOffsetGrow * 0.3);
        offsetX = (rng() - 0.5) * 2 * maxOff;
        rotation = (rng() - 0.5) * 2 * 5;
        timer = Math.max(1.5, 3.5 - baseTimerShrink);
    } else if (posInCycle === 1) {
        // Medium: offset + light rotation
        const maxOff = Math.min(95, 38 + baseOffsetGrow);
        offsetX = (rng() - 0.5) * 2 * maxOff;
        const maxRot = Math.min(30, 10 + baseRotGrow);
        rotation = (rng() - 0.5) * 2 * maxRot;
        timer = Math.max(1.5, 3.0 - baseTimerShrink);
    } else if (posInCycle === 2) {
        // Hard: wide offset + heavy rotation
        const maxOff = Math.min(95, 62 + baseOffsetGrow);
        offsetX = (rng() - 0.5) * 2 * maxOff;
        const maxRot = Math.min(30, 20 + baseRotGrow);
        rotation = (rng() - 0.5) * 2 * maxRot;
        timer = Math.max(1.5, 2.5 - baseTimerShrink);
    } else {
        // Recovery — light offset, generous timer
        const maxOff = Math.min(95, 15 + baseOffsetGrow * 0.3);
        offsetX = (rng() - 0.5) * 2 * maxOff;
        rotation = 0;
        timer = Math.max(1.5, 3.5 - baseTimerShrink);
    }

    // Drift ramps with cycle — always present, gets faster
    driftSpeed = Math.min(1.2, 0.2 + cycle * 0.2);
    rotSpeed = cycle >= 1 ? Math.min(0.6, 0.15 + (cycle - 1) * 0.15) : 0;

    return { sandwichIdx, offsetX, rotation, timer, drift, driftSpeed, rotSpeed };
}

function loadLunchRushData() {
    try {
        const raw = localStorage.getItem('shortcut_lunch_rush');
        if (!raw) return null;
        return JSON.parse(raw);
    } catch(e) { return null; }
}

function saveLunchRushData(data) {
    try { localStorage.setItem('shortcut_lunch_rush', JSON.stringify(data)); } catch(e) {}
}

function loadLunchRushDayStreak() {
    try {
        const raw = localStorage.getItem('shortcut_lunch_rush_streak');
        if (!raw) return null;
        return JSON.parse(raw);
    } catch(e) { return null; }
}

function saveLunchRushDayStreak(data) {
    try { localStorage.setItem('shortcut_lunch_rush_streak', JSON.stringify(data)); } catch(e) {}
}

function showToast(msg) {
    toastMessage = msg;
    toastTimer = 90;
    ctx.font = '12px "Press Start 2P", cursive';
    toastWidth = ctx.measureText(msg).width + 30;
    AudioSystem.uiSelect();
}

// ============================================
// SHARING SYSTEM
// ============================================

function getPlayerShareUrl() {
    return GAME_URL + '?ref=' + playerId;
}

function getShareText() {
    const avg = getAvgScore();
    const rank = getRankTitle(avg);
    let text = '\u2702\uFE0F Short Cut \uD83E\uDD6A\n';
    const names = SANDWICH_NAMES;
    for (let i = 0; i < roundScores.length; i++) {
        const name = names[i].padEnd(16);
        text += name + roundScores[i].toFixed(1) + '%\n';
    }
    text += '\u2500\u2500\u2500\u2500\u2500\n';
    text += avg.toFixed(1) + '% \u00B7 ' + rank + '\n';
    text += getPlayerShareUrl();
    return text;
}

async function generateShareCard() {
    // Wait for font to be loaded before drawing text
    try { await document.fonts.ready; } catch(e) {}

    const c = document.createElement('canvas');
    c.width = 1080;
    c.height = 1350;
    const cx = c.getContext('2d');

    // Kraft paper background
    cx.fillStyle = '#C4A87C';
    cx.fillRect(0, 0, 1080, 1350);

    // Paper grain texture
    cx.save();
    cx.globalAlpha = 0.06;
    for (let i = 0; i < 3000; i++) {
        const gx = Math.random() * 1080;
        const gy = Math.random() * 1350;
        cx.fillStyle = Math.random() > 0.5 ? '#A08050' : '#D8C4A0';
        cx.fillRect(gx, gy, Math.random() * 3 + 1, 1);
    }
    cx.restore();

    // Black border
    cx.strokeStyle = '#000';
    cx.lineWidth = 8;
    cx.strokeRect(30, 30, 1020, 1290);
    cx.strokeStyle = '#333';
    cx.lineWidth = 2;
    cx.strokeRect(42, 42, 996, 1266);

    // Title — stacked logo
    cx.font = '36px "Press Start 2P", cursive';
    cx.fillStyle = '#000';
    cx.textAlign = 'center';
    cx.fillText('S H O R T  C U T', 540, 160);

    cx.font = '18px "Press Start 2P", cursive';
    cx.fillStyle = '#000';
    cx.fillText('cOUNTEr', 540, 205);
    cx.fillText('SERVICE', 540, 230);

    // Thin divider line
    cx.strokeStyle = '#000';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(120, 260);
    cx.lineTo(960, 260);
    cx.stroke();

    // Score bars
    const names = SANDWICH_NAMES;
    const barY = 300;
    const barH = 50;
    const barSpacing = 100;
    const barMaxW = 560;
    const barX = 200;

    for (let i = 0; i < roundScores.length; i++) {
        const y = barY + i * barSpacing;
        const pct = roundScores[i] / 100;
        const sandIdx = ROUND_CONFIG[i].sandwichIdx;
        const dominant = SANDWICHES[sandIdx].dominant;

        // Side-view thumbnail
        drawSideSprite(cx, sandIdx, barX - 55, y + barH / 2, 100);

        // Name
        cx.font = '14px "Press Start 2P", cursive';
        cx.textAlign = 'left';
        cx.fillStyle = '#000';
        cx.fillText(names[i], barX, y - 12);

        // Bar background (grooved shadow)
        cx.fillStyle = '#A08060';
        cx.fillRect(barX, y, barMaxW, barH);
        cx.fillStyle = '#B89870';
        cx.fillRect(barX + 1, y + 1, barMaxW - 2, barH - 2);

        // Bar fill — sandwich dominant color
        cx.fillStyle = dominant;
        cx.fillRect(barX + 1, y + 1, (barMaxW - 2) * pct, barH - 2);

        // Score text
        cx.font = '20px "Press Start 2P", cursive';
        cx.fillStyle = '#000';
        cx.textAlign = 'right';
        cx.fillText(roundScores[i].toFixed(1) + '%', barX + barMaxW + 130, y + barH / 2 + 8);
    }

    // Divider before average
    cx.strokeStyle = '#000';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(120, barY + 5 * barSpacing - 20);
    cx.lineTo(960, barY + 5 * barSpacing - 20);
    cx.stroke();

    // Average + Rank
    const avg = getAvgScore();
    const rank = getRankTitle(avg);

    cx.textAlign = 'center';
    cx.font = '14px "Press Start 2P", cursive';
    cx.fillStyle = '#000';
    cx.fillText('AVERAGE', 540, barY + 5 * barSpacing + 10);

    cx.font = '48px "Press Start 2P", cursive';
    cx.fillStyle = '#000';
    cx.fillText(avg.toFixed(1) + '%', 540, barY + 5 * barSpacing + 75);

    // Rank banner — Baron Red
    const bannerY = barY + 5 * barSpacing + 100;
    cx.fillStyle = '#E1625D';
    cx.fillRect(240, bannerY, 600, 55);
    cx.font = '24px "Press Start 2P", cursive';
    cx.fillStyle = '#FFF';
    cx.fillText(rank, 540, bannerY + 35);

    // Order CTA
    cx.font = '14px "Press Start 2P", cursive';
    cx.fillStyle = '#000';
    cx.fillText('ORDER NOW AT COUNTERSERVICE.COM', 540, 1260);

    return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('toBlob timeout')), 5000);
        try {
            c.toBlob(blob => {
                clearTimeout(timeout);
                if (blob) resolve(blob);
                else reject(new Error('toBlob returned null'));
            }, 'image/png');
        } catch(e) {
            clearTimeout(timeout);
            reject(e);
        }
    });
}

async function shareGame() {
    const avg = getAvgScore();
    Analytics.shareClick(avg, 'native');

    const shareText = getShareText();

    // Copy to clipboard FIRST while user gesture is still valid
    // iOS Safari gesture timing expires quickly during async operations
    let clipboardSuccess = false;
    try {
        await navigator.clipboard.writeText(shareText);
        clipboardSuccess = true;
    } catch(e) {
        // Clipboard failed, try execCommand fallback synchronously
        try {
            const ta = document.createElement('textarea');
            ta.value = shareText;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            clipboardSuccess = document.execCommand('copy');
            document.body.removeChild(ta);
        } catch(e2) { /* ignore */ }
    }

    // Try native share with image (use pre-generated blob for instant response)
    try {
        const blob = cachedShareCardBlob || await generateShareCard();
        const file = new File([blob], 'short-cut-score.png', { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                text: shareText,
                url: getPlayerShareUrl()
            });
            showToast('SHARED!');
            Analytics.shareSuccess(avg, 'native');
            Haptics.results();
            return;
        }
    } catch(e) {
        if (e.name === 'AbortError') return;
        // Fall through to show clipboard result
    }

    // Show result based on whether clipboard succeeded earlier
    if (clipboardSuccess) {
        showToast('LINK COPIED!');
        Analytics.shareSuccess(avg, 'clipboard');
    } else {
        showToast('SHARE FAILED');
    }
}

async function saveScoreCard() {
    const avg = getAvgScore();
    Analytics.saveImage(avg);

    try {
        const blob = cachedShareCardBlob || await generateShareCard();
        const file = new File([blob], 'short-cut-score.png', { type: 'image/png' });
        const coupon = getCouponInfo(avg);
        const shareText = 'I scored ' + avg.toFixed(1) + '% in Short Cut and earned ' + coupon.rank + '!\n' + GAME_URL;

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ files: [file], text: shareText });
                showToast('SHARED!');
                return;
            } catch(e) {
                if (e.name === 'AbortError') return;
            }
        }

        // Desktop / Android fallback: <a download>
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'short-cut-score.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        showToast('SAVED!');
    } catch(e) {
        showToast('SAVE FAILED');
    }
}

async function generateLunchRushShareCard() {
    try { await document.fonts.ready; } catch(e) {}

    const cardH = 850;
    const c = document.createElement('canvas');
    c.width = 1080;
    c.height = cardH;
    const cx = c.getContext('2d');

    // Kraft paper background
    cx.fillStyle = '#C4A87C';
    cx.fillRect(0, 0, 1080, cardH);
    cx.save();
    cx.globalAlpha = 0.06;
    for (let i = 0; i < 2000; i++) {
        const gx = Math.random() * 1080;
        const gy = Math.random() * cardH;
        cx.fillStyle = Math.random() > 0.5 ? '#A08050' : '#D8C4A0';
        cx.fillRect(gx, gy, Math.random() * 3 + 1, 1);
    }
    cx.restore();

    // Black border
    cx.strokeStyle = '#000';
    cx.lineWidth = 8;
    cx.strokeRect(30, 30, 1020, cardH - 60);
    cx.strokeStyle = '#333';
    cx.lineWidth = 2;
    cx.strokeRect(42, 42, 996, cardH - 84);

    // Title
    cx.font = '48px "Press Start 2P", cursive';
    cx.fillStyle = '#E1625D';
    cx.textAlign = 'center';
    cx.strokeStyle = '#000';
    cx.lineWidth = 6;
    cx.strokeText("COULDN'T", 540, 130);
    cx.strokeText('CUT IT', 540, 190);
    cx.fillText("COULDN'T", 540, 130);
    cx.fillText('CUT IT', 540, 190);

    // Killer sandwich
    const killW = 400;
    cx.save();
    cx.translate(540, 310);
    cx.rotate(-0.12);
    drawSideSprite(cx, lunchRushKillingSandwich, 0, 0, killW);
    cx.restore();
    cx.font = '16px "Press Start 2P", cursive';
    cx.fillStyle = '#555';
    cx.fillText(SANDWICHES[lunchRushKillingSandwich].name, 540, 405);

    // Killing score
    if (lunchRushScores.length > 0) {
        const killingScore = lunchRushScores[lunchRushScores.length - 1];
        cx.font = '18px "Press Start 2P", cursive';
        if (killingScore === 0) {
            cx.fillStyle = '#E1625D';
            cx.fillText("TIME'S UP", 540, 460);
        } else {
            cx.fillStyle = '#555';
            cx.fillText('Final cut: ' + killingScore.toFixed(1) + '%', 540, 460);
        }
    }

    // Best today
    cx.font = '22px "Press Start 2P", cursive';
    cx.fillStyle = '#000';
    cx.fillText('BEST TODAY: ' + lunchRushBestToday, 540, 515);

    // Day streak
    if (lunchRushDayStreak > 1) {
        cx.font = '16px "Press Start 2P", cursive';
        cx.fillStyle = '#555';
        cx.fillText('DAY ' + lunchRushDayStreak + ' STREAK', 540, 555);
    }

    // Tally marks
    const survived = lunchRushStreak;
    const tallyY = 600;
    cx.save();
    cx.strokeStyle = '#5A4530';
    cx.lineWidth = 6;
    cx.lineCap = 'round';
    cx.beginPath();
    if (survived === 0) {
        // X mark
        const xSize = 25;
        cx.moveTo(540 - xSize, tallyY);
        cx.lineTo(540 + xSize, tallyY + xSize * 2);
        cx.moveTo(540 + xSize, tallyY);
        cx.lineTo(540 - xSize, tallyY + xSize * 2);
    } else {
        const tallyH = 50, tallyW = 8, tallyGap = 14, groupGap = 35;
        const maxShow = Math.min(survived, 30);
        const groups = Math.ceil(maxShow / 5);
        const totalW = groups * (5 * (tallyW + tallyGap) - tallyGap + groupGap) - groupGap;
        let tx = (1080 - totalW) / 2;
        for (let i = 0; i < maxShow; i++) {
            const posInGroup = i % 5;
            if (posInGroup === 4) {
                const strikeStartX = tx - 4 * (tallyW + tallyGap);
                cx.moveTo(strikeStartX - 4, tallyY + tallyH + 6);
                cx.lineTo(tx + tallyW + 4, tallyY - 6);
            } else {
                const wobble = ((i * 7 + 3) % 5 - 2) * 0.04;
                cx.moveTo(tx + tallyW / 2, tallyY);
                cx.lineTo(tx + tallyW / 2 + wobble * tallyH, tallyY + tallyH);
                tx += tallyW + tallyGap;
            }
            if (posInGroup === 4 && i < maxShow - 1) tx += groupGap;
        }
        if (survived > 30) {
            cx.stroke();
            cx.restore();
            cx.font = '20px "Press Start 2P", cursive';
            cx.fillStyle = '#5A4530';
            cx.fillText('+' + (survived - 30), tx + 30, tallyY + tallyH / 2 + 8);
            cx.save(); // balance save/restore
        }
    }
    cx.stroke();
    cx.restore();

    // Order CTA
    cx.font = '14px "Press Start 2P", cursive';
    cx.fillStyle = '#000';
    cx.textAlign = 'center';
    cx.fillText('ORDER NOW AT COUNTERSERVICE.COM', 540, cardH - 55);

    return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('toBlob timeout')), 5000);
        try {
            c.toBlob(blob => {
                clearTimeout(timeout);
                if (blob) resolve(blob);
                else reject(new Error('toBlob returned null'));
            }, 'image/png');
        } catch(e) {
            clearTimeout(timeout);
            reject(e);
        }
    });
}

async function saveLunchRushCard() {
    try {
        const blob = cachedShareCardBlob || await generateLunchRushShareCard();
        const file = new File([blob], 'lunch-rush-score.png', { type: 'image/png' });
        const shareText = 'Lunch Rush — ' + lunchRushStreak + (lunchRushStreak === 1 ? ' cut' : ' cuts') + '!\n' + GAME_URL;

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ files: [file], text: shareText });
                showToast('SHARED!');
                return;
            } catch(e) {
                if (e.name === 'AbortError') return;
            }
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'lunch-rush-score.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        showToast('SAVED!');
    } catch(e) {
        showToast('SAVE FAILED');
    }
}

// ============================================
// LUNCH RUSH SHARING
// ============================================

function getLunchRushShareText() {
    return '\uD83D\uDD2A Lunch Rush \u2014 ' + lunchRushStreak + (lunchRushStreak === 1 ? ' cut' : ' cuts') + '\n' + GAME_URL;
}

async function shareLunchRush() {
    const shareText = getLunchRushShareText();
    Analytics.shareClick(lunchRushStreak, 'lunch_rush');

    // Try native share with image (use pre-generated blob for instant response)
    try {
        const blob = cachedShareCardBlob || await generateLunchRushShareCard();
        const file = new File([blob], 'lunch-rush-score.png', { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], text: shareText });
            showToast('SHARED!');
            Analytics.shareSuccess(lunchRushStreak, 'lunch_rush');
            return;
        }
    } catch(e) {
        if (e.name === 'AbortError') return;
    }

    // Fallback to clipboard
    copyToClipboard(shareText);
}

function copyToClipboard(text) {
    // textarea fallback first — works in more contexts than clipboard API
    let success = false;
    try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        success = document.execCommand('copy');
        document.body.removeChild(ta);
    } catch(e) { /* fallthrough */ }

    if (!success && navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
            showToast('COPIED!');
            Analytics.shareSuccess(lunchRushStreak, 'lunch_rush');
        }).catch(function() {
            showToast('SHARE FAILED');
        });
        return;
    }

    if (success) {
        showToast('COPIED!');
        Analytics.shareSuccess(lunchRushStreak, 'lunch_rush');
    } else {
        showToast('SHARE FAILED');
    }
}

// ============================================
// REWARD SCREEN TAP HANDLER
// ============================================

function handleRewardTap(cx, cy) {
    const avg = getAvgScore();
    const { code } = getCouponInfo(avg);

    // Check coupon code tap area
    if (buttons.coupon) {
        const b = buttons.coupon;
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(code);
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = code;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                }
                showToast('COPIED!');
                Analytics.couponCopy(code);
            } catch(e) {
                showToast(code);
            }
            return;
        }
    }

    // Challenge button
    if (buttons.challenge) {
        const b = buttons.challenge;
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
            shareGame();
            return;
        }
    }

    // Save button (legacy, kept for safety)
    if (buttons.save) {
        const b = buttons.save;
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
            saveScoreCard();
            return;
        }
    }

    // Play again button
    if (buttons.playAgain) {
        const b = buttons.playAgain;
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
            Analytics.playAgain(avg, lunchRushMode ? 'lunch_rush' : 'main');
            gameState = 'title';
            releaseWakeLock();
            return;
        }
    }

    // Lunch Rush button on reward screen
    if (lunchRushUnlocked && buttons.dailyReward) {
        const b = buttons.dailyReward;
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
            startLunchRush();
            return;
        }
    }

}

// ============================================
// UPDATE LOOP
// ============================================

function update(deltaTime) {
    dt = deltaTime;
    frameCount++;
    updateParticles();

    if (toastTimer > 0) toastTimer--;
    if (streakFlashTimer > 0) streakFlashTimer--;

    switch (gameState) {
        case 'title':
            break;

        case 'intro':
            introTimer++;
            if (introTimer === 1) {
                setupRound();
                AudioSystem.sandwichEntrance();
            }
            sandwichEntranceProgress = Math.min(1, introTimer / 40);
            if (introTimer >= 150) {
                gameState = 'ready';
                goTimer = 30;
            }
            break;

        case 'ready':
            if (goTimer > 0) {
                goTimer--;
                if (goTimer === 0 && timerTotal > 0) {
                    timerActive = true;
                }
            }
            updateDrift();
            updateTimer();
            break;

        case 'cutting':
            if (goTimer > 0) {
                goTimer--;
                if (goTimer === 0 && timerTotal > 0) {
                    timerActive = true;
                }
            }
            updateDrift();
            updateTimer();
            // Update trail particles
            for (let i = cutParticles.length - 1; i >= 0; i--) {
                cutParticles[i].life--;
                if (cutParticles[i].life <= 0) cutParticles.splice(i, 1);
            }
            break;

        case 'animating':
            updateCutAnimation();
            break;

        case 'animating_score':
            scoreDisplay.timer--;
            if (scoreDisplay.timer <= 0) {
                // Check for short call (after round 1, first play)
                if (currentRound === 0 && !shortCallShown && playCount <= 1 && !lunchRushMode) {
                    shortCallShown = true;
                    try { localStorage.setItem('shortcut_short_call', 'true'); } catch(e) {}
                    gameState = 'short_call';
                } else {
                    advanceToNextRound();
                }
            }
            break;

        case 'short_call':
            break;

        case 'results':
            resultsTimer++;
            // Phase 0: animating bars (300ms each = 18 frames)
            if (resultsPhase === 0) {
                resultsAnimProgress = Math.min(1, resultsTimer / (18 * roundScores.length + 30));
                if (resultsTimer > 18 * roundScores.length + 60) resultsPhase = 1;
            }
            // Phase 1: count-up average
            if (resultsPhase === 1) {
                resultsAnimProgress = Math.min(1, (resultsTimer - 18 * roundScores.length - 60) / 40);
                if (resultsAnimProgress >= 1) {
                    resultsPhase = 2;
                    AudioSystem.rankFanfare();
                    Haptics.results();
                }
            }
            // Phase 2: rank reveal, wait for tap to continue (no auto-advance)
            break;

        case 'menu_show':
            break;

        case 'reward':
            break;

        case 'timeout':
            if (timeoutAdvanceTimer > 0) {
                timeoutAdvanceTimer -= dt;
                if (timeoutAdvanceTimer <= 0) {
                    timeoutAdvanceTimer = 0;
                    advanceToNextRound();
                }
            }
            break;

        case 'lunch_rush_death':
            break;
    }
}

function updateDrift() {
    if (driftVX === 0 && driftVR === 0) return;

    const dtScale = dt * 60; // normalize to 60fps baseline
    sandwich.x += driftVX * dtScale;
    sandwich.rotation += driftVR * dtScale;

    // Bounce off edges
    const hw = sandwich.w / 2 + 10;
    if (sandwich.x - hw < 0) { sandwich.x = hw; driftVX = Math.abs(driftVX); }
    if (sandwich.x + hw > GW) { sandwich.x = GW - hw; driftVX = -Math.abs(driftVX); }

    // Oscillate rotation
    if (sandwich.rotation > 25) { sandwich.rotation = 25; driftVR = -Math.abs(driftVR); }
    if (sandwich.rotation < -25) { sandwich.rotation = -25; driftVR = Math.abs(driftVR); }
}

function updateTimer() {
    if (!timerActive || timerRemaining <= 0) return;
    timerRemaining -= dt;

    // Tick sound
    if (timerRemaining <= timerTotal && timerRemaining > 0) {
        const urgency = 1 - (timerRemaining / timerTotal);
        if (frameCount % Math.max(6, Math.floor(20 * (1 - urgency))) === 0) {
            AudioSystem.timerTick(urgency);
            Haptics.timerTick();
        }
    }

    if (timerRemaining <= 0) {
        timerRemaining = 0;
        timerActive = false;
        roundScores.push(0);
        const timeoutSandwichIdx = lunchRushMode ? lunchRushCachedConfig.sandwichIdx : ROUND_CONFIG[Math.min(currentRound, 4)].sandwichIdx;
        Analytics.roundTimeout(currentRound + 1, SANDWICHES[timeoutSandwichIdx].name);
        AudioSystem.timerBuzz();
        gameState = 'timeout';
        scoreDisplay = { score: 0, label: "TIME'S UP!", subtitle: '', color: COLORS.baronRed, timer: 90 };
        timeoutAdvanceTimer = 1.5; // seconds, frame-based
    }
}

// ============================================
// RENDER LOOP
// ============================================

function render() {
    // Clear
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, GW, GH);

    switch (gameState) {
        case 'title': renderTitle(); break;
        case 'intro': renderIntro(); break;
        case 'ready': renderGame(); break;
        case 'cutting': renderGame(); renderCutLine(); break;
        case 'animating': renderAnimating(); break;
        case 'animating_score': renderAnimating(); renderScoreDisplay(); break;
        case 'short_call': renderShortCall(); break;
        case 'results': renderResults(); break;
        case 'menu_show': renderMenuShow(); break;
        case 'reward': renderReward(); break;
        case 'timeout': renderGame(); renderScoreDisplay(); break;
        case 'lunch_rush_death': renderLunchRushDeath(); break;
    }

    // Streak effects
    if (streakFlashTimer > 0 && streak >= 3) {
        ctx.save();
        ctx.globalAlpha = (streakFlashTimer / 60) * 0.3;
        ctx.strokeStyle = COLORS.perfectGold;
        ctx.lineWidth = 4;
        ctx.strokeRect(4, 4, GW - 8, GH - 8);
        ctx.restore();
    }

    // Toast
    if (toastTimer > 0) {
        const alpha = toastTimer > 20 ? 1 : toastTimer / 20;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(GW / 2 - toastWidth / 2, GH - 70, toastWidth, 30);
        drawText(toastMessage, GW / 2, GH - 55, 12, COLORS.csYellow);
        ctx.restore();
    }

    renderParticles();
}

function renderTitle() {
    // Kitchen background
    renderKitchenBg();

    // Dark overlay so text is readable
    ctx.fillStyle = 'rgba(10,10,18,0.75)';
    ctx.fillRect(0, 0, GW, GH);

    // Counter Service logo — small, top
    drawText('cOUNTEr', GW / 2, 30, 8, '#777');
    drawText('SERVICE', GW / 2, 44, 8, '#777');

    // Title — big and bold
    drawTextOutline('SHORT', GW / 2, 100, 36, COLORS.csYellow, '#000');
    drawTextOutline('CUT', GW / 2, 146, 36, COLORS.csYellow, '#000');

    // Large sandwich — no box, gentle bob animation
    const bobY = Math.sin(frameCount * 0.03) * 4;
    const sw = { x: 0, y: 0, w: 240, h: 96, rotation: 0, visible: true };
    ctx.save();
    ctx.translate(GW / 2, 240 + bobY);
    drawSandwich(sw, ROUND_CONFIG[0].sandwichIdx);
    ctx.restore();

    // Hook text
    drawText('CAN YOU CUT IT?', GW / 2, 310, 9, '#AAA');

    // PLAY button — red box with pulsing glow, matches Lunch Rush style
    const playBw = 160, playBh = 34;
    const playBx = GW / 2 - playBw / 2, playBy = 350;

    // Pulsing glow behind button
    const glowAlpha = 0.15 + Math.sin(frameCount * 0.06) * 0.1;
    ctx.save();
    ctx.globalAlpha = glowAlpha;
    ctx.fillStyle = COLORS.baronRed;
    drawRoundedRect(playBx - 3, playBy - 3, playBw + 6, playBh + 6, 6);
    ctx.restore();

    // Button fill
    ctx.fillStyle = 'rgba(183,71,71,0.3)';
    drawRoundedRect(playBx, playBy, playBw, playBh, 4);
    ctx.strokeStyle = COLORS.baronRed;
    ctx.lineWidth = 1.5;
    drawRoundedRect(playBx, playBy, playBw, playBh, 4, true);
    drawText('PLAY', GW / 2, playBy + playBh / 2, 14, COLORS.offWhite);
    buttons.play = { x: playBx, y: playBy, w: playBw, h: playBh };

    // Lunch Rush button — muted, below PLAY
    if (lunchRushUnlocked) {
        const bx = GW / 2 - 80, by = 420, bw = 160, bh = 28;
        ctx.fillStyle = 'rgba(241,236,191,0.15)';
        drawRoundedRect(bx, by, bw, bh, 4);
        ctx.strokeStyle = 'rgba(241,236,191,0.5)';
        ctx.lineWidth = 1;
        drawRoundedRect(bx, by, bw, bh, 4, true);
        drawText('LUNCH RUSH', GW / 2, by + 14, 8, 'rgba(241,236,191,0.7)');
        buttons.daily = { x: bx, y: by, w: bw, h: bh };
        if (lunchRushDayStreak > 1) {
            drawText('DAY ' + lunchRushDayStreak + ' STREAK', GW / 2, by + bh + 12, 6, '#666');
        }
    }
}


function renderIntro() {
    // Background
    renderBoard();

    const config = lunchRushMode ? lunchRushCachedConfig : ROUND_CONFIG[currentRound];
    const sandIdx = config.sandwichIdx;
    const data = SANDWICHES[sandIdx];

    // Round number — above the board
    if (lunchRushMode) {
        drawText('LUNCH RUSH', GW / 2, 40, 12, COLORS.csYellow);
        drawText('CUT ' + (currentRound + 1), GW / 2, 62, 10, COLORS.offWhite);
    } else {
        drawText('ROUND ' + (currentRound + 1), GW / 2, 50, 16, COLORS.csYellow);
    }

    // Sandwich name — above the board
    drawText(data.name.toUpperCase(), GW / 2, 90, 14, COLORS.offWhite);

    // Flavor text — above the board
    ctx.font = '8px "Press Start 2P", cursive';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const words = data.flavor.split(' ');
    let line = '';
    let lineY = 120;
    for (const word of words) {
        const test = line + (line ? ' ' : '') + word;
        if (ctx.measureText(test).width > GW - 60) {
            ctx.fillText(line, GW / 2, lineY);
            line = word;
            lineY += 14;
        } else {
            line = test;
        }
    }
    if (line) ctx.fillText(line, GW / 2, lineY);

    // "TAP TO SKIP" hint — fades in after sandwich arrives
    if (introTimer > 50) {
        const fadeIn = Math.min(1, (introTimer - 50) / 20);
        ctx.save();
        ctx.globalAlpha = fadeIn * 0.5;
        ctx.font = '6px "Press Start 2P", cursive';
        ctx.fillStyle = '#AAA';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('TAP TO SKIP', GW / 2, GH - 30);
        ctx.restore();
    }

    // Sandwich sliding in
    if (sandwich.visible) {
        const ease = 1 - Math.pow(1 - sandwichEntranceProgress, 3);
        const slideX = GW + 100 - (GW + 100 - sandwich.x) * ease;
        const tempSw = { ...sandwich, x: slideX };
        const introSandIdx = lunchRushMode ? lunchRushCachedConfig.sandwichIdx : ROUND_CONFIG[currentRound].sandwichIdx;
        drawSandwich(tempSw, introSandIdx);
    }
}

function renderKitchenBg(alpha) {
    if (!kitchenCanvas) {
        kitchenCanvas = document.createElement('canvas');
        kitchenCanvas.width = GW;
        kitchenCanvas.height = GH;
        const k = kitchenCanvas.getContext('2d');
        buildKitchenScene(k);
    }
    if (alpha !== undefined && alpha < 1) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.drawImage(kitchenCanvas, 0, 0);
        ctx.restore();
    } else {
        ctx.drawImage(kitchenCanvas, 0, 0);
    }
}

function buildKitchenScene(k) {
    const W = GW, H = GH;

    // === CEILING (y: 0–40) ===
    k.fillStyle = '#2A2A30';
    k.fillRect(0, 0, W, 42);
    // Ceiling panels
    k.fillStyle = '#323238';
    for (let x = 0; x < W; x += 96) {
        k.fillRect(x + 2, 2, 92, 36);
    }
    // Panel highlight lines
    k.strokeStyle = '#3A3A42';
    k.lineWidth = 1;
    for (let x = 0; x < W; x += 96) {
        k.beginPath(); k.moveTo(x + 2, 2); k.lineTo(x + 94, 2); k.stroke();
    }

    // Fluorescent tube lights
    for (let lx = 60; lx < W; lx += 160) {
        // Housing
        k.fillStyle = '#505058';
        k.fillRect(lx - 40, 28, 80, 8);
        // Tube glow
        k.fillStyle = '#E8E8D8';
        k.fillRect(lx - 34, 30, 68, 4);
        // Glow halo
        k.fillStyle = 'rgba(240,240,220,0.06)';
        k.fillRect(lx - 50, 36, 100, 20);
    }

    // === HOOD VENT (y: 40–70) ===
    k.fillStyle = '#606068';
    k.fillRect(20, 40, W - 40, 32);
    // Vent slats
    k.strokeStyle = '#50505A';
    k.lineWidth = 1;
    for (let y = 44; y < 70; y += 4) {
        k.beginPath(); k.moveTo(24, y); k.lineTo(W - 24, y); k.stroke();
    }
    // Hood lip / drip edge
    k.fillStyle = '#707078';
    k.fillRect(18, 70, W - 36, 3);
    // Highlight on hood top
    k.fillStyle = '#6E6E78';
    k.fillRect(20, 40, W - 40, 1);

    // === UPPER WALL — WOOD PANELING + MENU BOARD (y: 73–160) ===
    k.fillStyle = '#8B6B4A';
    k.fillRect(0, 73, W, 87);
    // Wood grain lines
    k.strokeStyle = '#7A5C3C';
    k.lineWidth = 1;
    for (let y = 76; y < 160; y += 6) {
        k.beginPath();
        k.moveTo(0, y);
        for (let x = 0; x < W; x += 8) {
            k.lineTo(x, y + ((x * 7 + y * 3) % 3 - 1));
        }
        k.stroke();
    }
    // Vertical board seams
    k.strokeStyle = '#6B4C2E';
    k.lineWidth = 1;
    for (let x = 48; x < W; x += 48) {
        k.beginPath(); k.moveTo(x, 73); k.lineTo(x, 160); k.stroke();
    }

    // Menu board — simplified kraft rectangle with divider
    k.fillStyle = '#C4AA80';
    k.fillRect(30, 80, W - 60, 50);
    k.strokeStyle = '#A08860';
    k.lineWidth = 1;
    k.strokeRect(30, 80, W - 60, 50);
    // Center divider
    k.strokeStyle = '#8A7050';
    k.beginPath(); k.moveTo(W / 2, 84); k.lineTo(W / 2, 126); k.stroke();

    // Ticket rail with order slips
    k.fillStyle = '#888890';
    k.fillRect(24, 140, W - 48, 3);
    // Brackets
    k.fillStyle = '#606068';
    for (let x = 40; x < W - 40; x += 80) {
        k.fillRect(x, 139, 4, 5);
    }
    // Tickets
    const ticketColors = ['#F0EAD8', '#EEEED8', '#F2ECDA'];
    for (let i = 0; i < 5; i++) {
        const tx = 60 + i * 64;
        const th = 12 + (i * 7 % 4);
        k.fillStyle = ticketColors[i % ticketColors.length];
        k.fillRect(tx, 143, 24, th);
    }

    // === STAINLESS STEEL BACKSPLASH (y: 160–210) ===
    k.fillStyle = '#A0A0A8';
    k.fillRect(0, 160, W, 52);
    // Brushed steel horizontal lines
    k.strokeStyle = '#96969E';
    k.lineWidth = 1;
    for (let y = 162; y < 212; y += 2) {
        k.globalAlpha = 0.3 + (y % 4 === 0 ? 0.15 : 0);
        k.beginPath(); k.moveTo(0, y); k.lineTo(W, y); k.stroke();
    }
    k.globalAlpha = 1;
    // Highlight strip
    k.fillStyle = '#B8B8C0';
    k.fillRect(0, 165, W, 1);

    // === STAINLESS STEEL COUNTER / PREP AREA (y: 212–430) ===
    k.fillStyle = '#B0B0B8';
    k.fillRect(0, 212, W, 220);
    // Brushed steel texture
    k.strokeStyle = '#A4A4AC';
    k.lineWidth = 1;
    for (let y = 214; y < 432; y += 2) {
        k.globalAlpha = 0.2 + ((y * 13) % 5) * 0.05;
        k.beginPath(); k.moveTo(0, y); k.lineTo(W, y); k.stroke();
    }
    k.globalAlpha = 1;
    // Counter top highlight
    k.fillStyle = '#C4C4CC';
    k.fillRect(0, 212, W, 2);
    // Counter front lip
    k.fillStyle = '#989898';
    k.fillRect(0, 430, W, 4);

    // Subtle reflections on counter surface
    k.fillStyle = 'rgba(200,200,210,0.06)';
    k.fillRect(30, 240, 60, 160);
    k.fillRect(W - 90, 250, 60, 150);

    // === PENNY TILE FLOOR (y: 434–512) ===
    k.fillStyle = '#D8D8D8';
    k.fillRect(0, 434, W, 78);
    // Penny tile pattern
    const tileSize = 6;
    const tileGap = 1;
    const tileStep = tileSize + tileGap;
    for (let row = 0; row < 12; row++) {
        const rowY = 436 + row * tileStep;
        const offset = (row % 2) * (tileStep / 2);
        for (let col = 0; col < Math.ceil(W / tileStep) + 1; col++) {
            const tileX = offset + col * tileStep;
            const hash = (col * 7 + row * 13) % 10;
            k.fillStyle = hash < 3 ? '#2A2A2A' : '#E4E4E4';
            k.beginPath();
            k.arc(tileX + tileSize / 2, rowY + tileSize / 2, tileSize / 2, 0, Math.PI * 2);
            k.fill();
        }
    }
    // Floor edge shadow
    k.fillStyle = 'rgba(0,0,0,0.2)';
